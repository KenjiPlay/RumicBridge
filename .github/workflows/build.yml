name: Build RumicBridge

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ./RumicBridge.csproj

      - name: Build
        run: dotnet build ./RumicBridge.csproj -c Release

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: RumicBridge
          path: bin/Release/net9.0/RumicBridge.dll
